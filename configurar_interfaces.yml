---
-  name: Configurar interfaces de red
   hosts: routers
   gather_facts: false
   become: yes
   tasks:
     - name: Aplicar direccionamiento IP y activar interfaces
       cisco.ios.ios_config:
         parents: "interface {{ item.name }}"
         lines:
           - ip address {{ item.ip }} {{ item.mask }}
           - no shutdown
         save_when: modified
       loop: "{{interfaces }}"
